<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Processing...</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;background:#f8fafc;color:#1a1a2e}
.card{background:#fff;border-radius:12px;padding:48px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.08);max-width:480px}
h1{font-size:24px;margin:0 0 12px}
p{color:#64748b;font-size:15px;line-height:1.6}
.spinner{width:40px;height:40px;border:4px solid #e2e8f0;border-top-color:#2563eb;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 24px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card" id="card">
<div class="spinner"></div>
<h1>Processing your request...</h1>
<p id="status">Please wait...</p>
</div>
<script>
var params=new URLSearchParams(window.location.search);
var pageId=params.get('page_id');
var action=params.get('action');
var title=decodeURIComponent(params.get('title')||'document');
var webhookBase='https://build.twin.so/triggers/';
var webhookPath=action==='goodnotes'?'goodnotes_action/webhook':'delete_action/webhook';
// Append params to URL since no-cors prevents JSON body parsing
var queryStr='?page_id='+encodeURIComponent(pageId)+'&action='+encodeURIComponent(action)+'&title='+encodeURIComponent(title);
var url=webhookBase+webhookPath+queryStr;
document.getElementById('status').textContent=action==='goodnotes'?'Sending to GoodNotes and removing from Notion...':'Deleting from Notion...';
fetch(url,{method:'POST',mode:'no-cors'}).then(function(){
document.getElementById('card').innerHTML='<h1 style="color:#16a34a">&#10003; Done!</h1><p>'+(action==='goodnotes'?title+' has been sent to GoodNotes and will be removed from Notion.':title+' has been deleted from Notion.')+'</p><p style="font-size:13px;margin-top:16px;color:#94a3b8">You can close this tab.</p>';
}).catch(function(err){
document.getElementById('card').innerHTML='<h1 style="color:#dc2626">&#10007; Error</h1><p>Something went wrong. Please try again.</p><p style="font-size:12px;color:#94a3b8">'+err.message+'</p>';
});
</script>
</body>
</html>
